<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" role="img" aria-labelledby="title desc">
  <title id="title">Mohana Law Firm Logo</title>
  <desc id="desc">Stylized scales of justice emblem with Mohana Law Firm text.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#233D4C"/>
      <stop offset="100%" stop-color="#1A303D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FD802E"/>
      <stop offset="100%" stop-color="#F06D16"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="116" height="116" rx="18" fill="url(#bg)"/>

  <g transform="translate(60 60)">
    <rect x="-3" y="-32" width="6" height="50" rx="3" fill="#F2F4F7"/>
    <rect x="-28" y="-32" width="56" height="4" rx="2" fill="url(#accent)"/>
    <circle cx="0" cy="-36" r="5" fill="#F2F4F7"/>
    <line x1="-20" y1="-28" x2="-28" y2="-10" stroke="#F2F4F7" stroke-width="2"/>
    <line x1="20" y1="-28" x2="28" y2="-10" stroke="#F2F4F7" stroke-width="2"/>
    <path d="M -38 -10 Q -28 4 -18 -10 Z" fill="url(#accent)"/>
    <path d="M 18 -10 Q 28 4 38 -10 Z" fill="url(#accent)"/>
    <rect x="-12" y="18" width="24" height="6" rx="3" fill="#F2F4F7"/>
    <rect x="-24" y="24" width="48" height="6" rx="3" fill="url(#accent)"/>
  </g>

  <g font-family="Segoe UI, Tahoma, sans-serif" fill="#233D4C">
    <text x="138" y="52" font-size="32" font-weight="700" letter-spacing="0.4">Mohana</text>
    <text x="138" y="84" font-size="28" font-weight="600" fill="#FD802E" letter-spacing="0.4">Law Firm</text>
    <text x="138" y="104" font-size="11" font-weight="500" fill="#5B6E7A" letter-spacing="1.1">ONLINE LEGAL CONSULTATION</text>
  </g>
</svg>
